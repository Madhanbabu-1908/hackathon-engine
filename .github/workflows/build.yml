name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install server deps (including CORS)
        run: cd server && npm install cors && npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Copy favicon to public
        run: copy assets\icon.ico client\public\favicon.ico

      - name: Build EXE
        run: npx @yao-pkg/pkg . --targets node20-win-x64 --output dist-exe/HackathonEngine.exe

      - name: Replace EXE Icon with rcedit
        shell: pwsh
        run: |
          # Install rcedit via npm (more reliable than manual download)
          npm install -g rcedit
          
          # Verify icon exists and is valid
          if (-not (Test-Path assets/icon.ico)) { 
            Write-Error "Icon file not found!"
            exit 1 
          }
          
          # Force replace icon - rcedit handles PE resources safely
          rcedit "dist-exe/HackathonEngine.exe" --set-icon "assets/icon.ico"
          
          # Verify EXE still runs
          Test-Path "dist-exe/HackathonEngine.exe" || (Write-Error "EXE corrupted!")

      - name: Copy env template
        run: copy .env.example dist-exe\.env

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HackathonEngine-portable
          path: dist-exe/
