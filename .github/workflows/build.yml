name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root deps
        run: npm install

      - name: Install server deps
        run: cd server && npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Install pkg
        run: npm install -g pkg

      - name: Build EXE
        run: pkg launcher.cjs --targets node18-win-x64 --output dist-exe/HackathonEngine.exe

      - name: Patch EXE icon and execution level
        run: |
          npm install rcedit@4.0.1
          node -e "const rcedit = require('rcedit'); rcedit('dist-exe/HackathonEngine.exe', { icon: 'assets/icon.ico', 'requested-execution-level': 'asInvoker' }).then(() => console.log('Patched OK')).catch(e => { console.error(e); process.exit(1); })"

      - name: Copy env template
        run: copy .env.example dist-exe\.env

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HackathonEngine-portable
          path: dist-exe/
