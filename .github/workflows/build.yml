name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install server deps (including CORS)
        run: cd server && npm install cors && npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Copy favicon to public
        run: copy assets\icon.ico client\public\favicon.ico

      - name: Build EXE with Icon
        run: npx @yao-pkg/pkg . --targets node20-win-x64 --output dist-exe/HackathonEngine.exe --icon assets/icon.ico

      - name: Verify Icon Exists
        run: dir dist-exe\HackathonEngine.exe
        shell: cmd

      - name: Copy env template
        run: copy .env.example dist-exe\.env

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HackathonEngine-portable
          path: dist-exe/
