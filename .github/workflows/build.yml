name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root deps
        run: npm install

      - name: Install server deps
        run: cd server && npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Install pkg, pkg-fetch, rcedit
        run: npm install pkg pkg-fetch rcedit@4.0.1

      - name: Fetch and patch base Node binary (icon + execution level)
        run: |
          node -e "const fetch = require('pkg-fetch'); const rcedit = require('rcedit'); fetch.need({ tag: 'node18', platform: 'win', arch: 'x64' }).then(binPath => { console.log('Base binary:', binPath); return rcedit(binPath, { icon: 'assets/icon.ico', 'requested-execution-level': 'asInvoker' }); }).then(() => console.log('Base binary patched OK')).catch(e => { console.error(e); process.exit(1); })"

      - name: Build EXE
        run: npx pkg launcher.cjs --targets node18-win-x64 --output dist-exe/HackathonEngine.exe

      - name: Copy env template
        run: copy .env.example dist-exe\.env

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HackathonEngine-portable
          path: dist-exe/
